<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Iniciar sesión</title>
  <link rel="stylesheet" href="/static/css/styles.css" />
  <style>
    body { background: #f0f7f3; font-family: system-ui, sans-serif; margin: 0;
           display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card { background: #fff; border-radius: 12px; padding: 40px 36px;
                  box-shadow: 0 4px 24px rgba(0,0,0,0.08); width: 100%; max-width: 360px; }
    .login-logo { text-align: center; margin-bottom: 28px; }
    .login-logo img { height: 56px; }
    .login-title { text-align: center; font-size: 1.2rem; font-weight: 700;
                   color: #093825; margin: 0 0 24px; }
    .login-error { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626;
                   border-radius: 6px; padding: 10px 14px; font-size: 0.88rem; margin-bottom: 16px; }
    .field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 16px; }
    .field label { font-size: 0.82rem; font-weight: 600; color: #475569; }
    .btn-login { width: 100%; background: #093825; color: #fff; border: none;
                 border-radius: 8px; padding: 12px; font-size: 1rem; font-weight: 600;
                 cursor: pointer; margin-top: 8px; }
    .btn-login:hover { background: #0d5236; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <img src="/static/images/logo.png" alt="Animal Libre" />
    </div>
    <h1 class="login-title">Panel de Administración</h1>

    {% if error %}
    <div class="login-error">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <div class="field">
        <label for="username">Usuario</label>
        <input id="username" name="username" class="input" type="text" required autofocus />
      </div>
      <div class="field">
        <label for="password">Contraseña</label>
        <input id="password" name="password" class="input" type="password" required />
      </div>
      <button type="submit" class="btn-login">Entrar</button>
    </form>
  </div>
</body>
</html>
